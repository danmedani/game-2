<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animal Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #1a2535;
      --surface: #1e2e42;
      --card:    #263a52;
      --accent:  #5bb8d4;
      --gold:    #ffd700;
      --red:     #e84040;
      --text:    #d8edf5;
      --muted:   #7aafc0;
      --border:  #2e4a62;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.4rem;
      color: var(--accent);
    }

    header .count {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .filter-input {
      margin-left: auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      width: 200px;
    }

    .filter-input::placeholder { color: var(--muted); }
    .filter-input:focus { outline: none; border-color: var(--accent); }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
    }

    .animal-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .animal-item:hover { background: var(--card); }
    .animal-item.active { background: var(--card); border-left: 3px solid var(--accent); }

    .animal-thumb {
      width: 48px;
      height: 36px;
      object-fit: cover;
      border-radius: 4px;
      background: var(--bg);
      flex-shrink: 0;
    }

    .animal-thumb.broken {
      border: 2px solid var(--red);
      opacity: 0.5;
    }

    .thumb-placeholder {
      width: 48px;
      height: 36px;
      border-radius: 4px;
      background: var(--bg);
      border: 1px dashed var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: var(--muted);
    }

    .animal-item-info {
      flex: 1;
      min-width: 0;
    }

    .animal-item-name {
      font-weight: 700;
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .animal-item-meta {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .badge-broken {
      font-size: 0.65rem;
      background: var(--red);
      color: white;
      padding: 1px 5px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .badge-missing {
      font-size: 0.65rem;
      background: #885500;
      color: var(--gold);
      padding: 1px 5px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    /* ── Editor ── */
    #editor {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      font-size: 1rem;
      gap: 8px;
    }

    .empty-state .big { font-size: 3rem; }

    .editor-inner {
      max-width: 720px;
    }

    .editor-name {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .editor-wiki {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .image-row {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .image-preview-wrap {
      flex-shrink: 0;
    }

    .image-preview {
      width: 440px;
      height: 320px;
      object-fit: contain;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--bg);
      display: block;
    }

    .image-preview.broken {
      border-color: var(--red);
      opacity: 0.4;
    }

    .image-status {
      font-size: 0.75rem;
      margin-top: 6px;
      text-align: center;
    }

    .image-status.ok  { color: var(--accent); }
    .image-status.err { color: var(--red); }

    .image-form {
      flex: 1;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    input[type="text"], textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      resize: vertical;
    }

    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .field-group {
      margin-bottom: 16px;
    }

    .btn-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    .btn-preview {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 14px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .btn-preview:hover { border-color: var(--accent); color: var(--accent); }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    .btn-save {
      background: var(--accent);
      color: #1a2535;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.4; cursor: default; }

    .save-status {
      font-size: 0.85rem;
      font-weight: 700;
    }
    .save-status.ok  { color: var(--accent); }
    .save-status.err { color: var(--red); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>🦣 Animal Admin</h1>
  <span class="count" id="header-count"></span>
  <input class="filter-input" id="filter-input" type="text" placeholder="Filter animals…" autocomplete="off"/>
</header>

<div class="layout">
  <div id="sidebar"></div>
  <div id="editor">
    <div class="empty-state" id="empty-state">
      <div class="big">🦣</div>
      <div>Select an animal to edit</div>
    </div>
    <div class="editor-inner" id="editor-inner" style="display:none"></div>
  </div>
</div>

<script src="js/animals.js"></script>
<script src="js/animal-data.js"></script>
<script>
// State
let selected = null;  // wiki key
let imageStatuses = {}; // wiki -> 'ok' | 'broken' | 'missing'

// Build sidebar
function buildSidebar(filter) {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';

  const q = (filter || '').toLowerCase();
  const items = ANIMALS.filter(a => !q || a.name.toLowerCase().includes(q) || a.wiki.toLowerCase().includes(q));

  items.forEach(animal => {
    const data = ANIMAL_DATA[animal.wiki] || {};
    const img = data.img || '';
    const status = imageStatuses[animal.wiki];

    const div = document.createElement('div');
    div.className = 'animal-item' + (selected === animal.wiki ? ' active' : '');
    div.dataset.wiki = animal.wiki;

    // Thumbnail
    if (img) {
      const imgEl = document.createElement('img');
      imgEl.className = 'animal-thumb' + (status === 'broken' ? ' broken' : '');
      imgEl.src = img;
      imgEl.alt = animal.name;
      imgEl.onload  = () => { markStatus(animal.wiki, 'ok');     refreshThumb(animal.wiki); };
      imgEl.onerror = () => { markStatus(animal.wiki, 'broken'); refreshThumb(animal.wiki); };
      div.appendChild(imgEl);
    } else {
      const ph = document.createElement('div');
      ph.className = 'thumb-placeholder';
      ph.textContent = '?';
      div.appendChild(ph);
    }

    // Info
    const extinctLabel = animal.extinct ? 'Extinct' : 'Extant';
    const info = document.createElement('div');
    info.className = 'animal-item-info';
    info.innerHTML = `<div class="animal-item-name">${animal.name}</div>
                      <div class="animal-item-meta">Lv ${animal.level} · ${extinctLabel}</div>`;
    div.appendChild(info);

    // Badge
    if (!img) {
      const b = document.createElement('span');
      b.className = 'badge-missing';
      b.textContent = 'no img';
      div.appendChild(b);
    } else if (status === 'broken') {
      const b = document.createElement('span');
      b.className = 'badge-broken';
      b.textContent = '✗';
      div.appendChild(b);
    }

    div.addEventListener('click', () => selectAnimal(animal.wiki));
    sidebar.appendChild(div);
  });

  document.getElementById('header-count').textContent =
    `${items.length} of ${ANIMALS.length} animals`;
}

function markStatus(wiki, status) {
  imageStatuses[wiki] = status;
}

function refreshThumb(wiki) {
  const item = document.querySelector(`.animal-item[data-wiki="${CSS.escape(wiki)}"]`);
  if (!item) return;
  const badge = item.querySelector('.badge-broken, .badge-missing');
  if (imageStatuses[wiki] === 'ok') {
    if (badge) badge.remove();
    const thumb = item.querySelector('.animal-thumb');
    if (thumb) thumb.classList.remove('broken');
  } else if (imageStatuses[wiki] === 'broken') {
    const thumb = item.querySelector('.animal-thumb');
    if (thumb) thumb.classList.add('broken');
    if (!badge) {
      const b = document.createElement('span');
      b.className = 'badge-broken';
      b.textContent = '✗';
      item.appendChild(b);
    }
  }
}

// Select & render editor
function selectAnimal(wiki) {
  selected = wiki;

  document.querySelectorAll('.animal-item').forEach(el => {
    el.classList.toggle('active', el.dataset.wiki === wiki);
  });

  const animal = ANIMALS.find(a => a.wiki === wiki);
  const data = ANIMAL_DATA[wiki] || {};

  document.getElementById('empty-state').style.display = 'none';
  const inner = document.getElementById('editor-inner');
  inner.style.display = 'block';

  inner.innerHTML = `
    <div class="editor-name">${animal.name}</div>
    <div class="editor-wiki">wiki key: <code>${wiki}</code> · Level ${animal.level} · ${animal.period}</div>

    <div class="image-row">
      <div class="image-preview-wrap">
        <img id="preview-img" class="image-preview" src="${escHtml(data.img || '')}" alt="${escHtml(animal.name)}"/>
        <div class="image-status" id="img-status"></div>
      </div>
      <div class="image-form">
        <div class="field-group">
          <label for="img-input">Image URL</label>
          <input type="text" id="img-input" value="${escHtml(data.img || '')}" placeholder="https://…"/>
        </div>
        <div class="btn-row">
          <button class="btn-preview" id="btn-preview">Preview</button>
        </div>
      </div>
    </div>

    <hr class="divider"/>

    <div class="field-group">
      <label for="short-input">Short description</label>
      <textarea id="short-input" rows="3">${escHtml(data.short || '')}</textarea>
    </div>

    <div class="field-group">
      <label for="full-input">Full description</label>
      <textarea id="full-input" rows="6">${escHtml(data.full || '')}</textarea>
    </div>

    <div class="btn-row">
      <button class="btn-save" id="btn-save">Save changes</button>
      <span class="save-status" id="save-status"></span>
    </div>
  `;

  const previewImg = document.getElementById('preview-img');
  const imgStatus  = document.getElementById('img-status');

  previewImg.onload  = () => { imgStatus.textContent = '✓ image loaded'; imgStatus.className = 'image-status ok'; };
  previewImg.onerror = () => { imgStatus.textContent = '✗ failed to load'; imgStatus.className = 'image-status err'; previewImg.classList.add('broken'); };

  if (!data.img) {
    imgStatus.textContent = 'No image set';
    imgStatus.className = 'image-status err';
  }

  document.getElementById('btn-preview').addEventListener('click', () => {
    const url = document.getElementById('img-input').value.trim();
    previewImg.classList.remove('broken');
    imgStatus.textContent = 'Loading…';
    imgStatus.className = 'image-status';
    previewImg.src = url;
  });

  document.getElementById('btn-save').addEventListener('click', async () => {
    const btn = document.getElementById('btn-save');
    const status = document.getElementById('save-status');
    btn.disabled = true;
    status.textContent = 'Saving…';
    status.className = 'save-status';

    const payload = {
      wiki,
      img:   document.getElementById('img-input').value.trim(),
      short: document.getElementById('short-input').value.trim(),
      full:  document.getElementById('full-input').value.trim(),
    };

    try {
      const res = await fetch('/api/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const json = await res.json();
      if (json.ok) {
        if (!ANIMAL_DATA[wiki]) ANIMAL_DATA[wiki] = {};
        Object.assign(ANIMAL_DATA[wiki], payload);
        imageStatuses[wiki] = undefined;
        buildSidebar(document.getElementById('filter-input').value);
        document.querySelector(`.animal-item[data-wiki="${CSS.escape(wiki)}"]`)?.classList.add('active');
        status.textContent = '✓ Saved!';
        status.className = 'save-status ok';
      } else {
        status.textContent = '✗ ' + (json.error || 'Error');
        status.className = 'save-status err';
      }
    } catch (e) {
      status.textContent = '✗ ' + e.message;
      status.className = 'save-status err';
    } finally {
      btn.disabled = false;
      setTimeout(() => { if (status.textContent.startsWith('✓')) status.textContent = ''; }, 3000);
    }
  });
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// Filter
document.getElementById('filter-input').addEventListener('input', e => {
  buildSidebar(e.target.value);
  if (selected) {
    const item = document.querySelector(`.animal-item[data-wiki="${CSS.escape(selected)}"]`);
    if (item) item.classList.add('active');
  }
});

// Init
buildSidebar();
</script>
</body>
</html>
