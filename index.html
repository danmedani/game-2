<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DinoQuest 🦕</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ══════════════════════════════════════════════════════ TITLE -->
<div id="screen-title" class="screen">
  <div class="title-dinos">🦕🦖🦕</div>
  <h1 class="game-title">DinoQuest</h1>
  <p class="game-subtitle">The Ultimate Dinosaur Challenge!</p>
  <button class="big-btn" id="btn-play">▶ PLAY</button>
  <button class="big-btn secondary" id="btn-scores-title">🏆 High Scores</button>
</div>

<!-- ══════════════════════════════════════════════════════ MODE SELECT -->
<div id="screen-menu" class="screen">
  <h2 class="screen-title">Choose Your Game</h2>
  <div class="mode-grid">
    <button class="mode-btn" data-mode="name-match">
      <span class="mode-icon">🔍</span>
      <span class="mode-label">Name Match</span>
      <span class="mode-desc">See a dino, pick its name!</span>
    </button>
    <button class="mode-btn" data-mode="pic-match">
      <span class="mode-icon">🖼️</span>
      <span class="mode-label">Picture Match</span>
      <span class="mode-desc">Hear a name, find the dino!</span>
    </button>
    <button class="mode-btn" data-mode="size-battle">
      <span class="mode-icon">📏</span>
      <span class="mode-label">Size Battle</span>
      <span class="mode-desc">Which dino was BIGGER?</span>
    </button>
    <button class="mode-btn" data-mode="dino-facts">
      <span class="mode-icon">📖</span>
      <span class="mode-label">Dino Facts</span>
      <span class="mode-desc">Match the clue to the dino!</span>
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════ LOADING -->
<div id="screen-loading" class="screen">
  <div class="loading-spinner">🦕</div>
  <p id="loading-msg">Loading dinosaurs...</p>
</div>

<!-- ══════════════════════════════════════════════════════ GAME -->
<div id="screen-game" class="screen">
  <div class="game-hud">
    <div class="hud-score"><span>Score</span><br><span id="hud-score">0</span></div>
    <div id="hud-lives" class="hud-lives"></div>
    <div id="hud-streak" class="hud-streak"></div>
    <div class="hud-q" id="hud-q">0/10</div>
    <button class="hud-quit" id="btn-quit-game">✕ Quit</button>
  </div>
  <div id="question-area"></div>
</div>

<!-- ══════════════════════════════════════════════════════ FEEDBACK OVERLAY -->
<div id="feedback-overlay"></div>

<!-- ══════════════════════════════════════════════════════ GAME OVER -->
<div id="screen-gameover" class="screen">
  <div style="font-size:3rem">🦕</div>
  <div class="gameover-label">Game Over!</div>
  <div class="gameover-score" id="final-score">0</div>
  <div class="gameover-meta">
    <span id="final-mode"></span>
  </div>
  <div class="highscore-msg" id="highscore-msg"></div>

  <div class="initials-wrap">
    <label for="initials-input">Enter Your Initials</label>
    <input type="text" id="initials-input" maxlength="3" placeholder="AAA" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <div id="initials-error"></div>
    <button class="big-btn" id="btn-submit-score">Save Score 🏆</button>
  </div>

  <div class="btn-row">
    <button class="big-btn" id="btn-play-again">Play Again</button>
    <button class="big-btn secondary" id="btn-main-menu">Main Menu</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════ HIGH SCORES -->
<div id="screen-highscores" class="screen">
  <div style="font-size:2.5rem">🏆</div>
  <h2 class="screen-title">High Scores</h2>
  <div id="hs-mode-label"></div>
  <table class="scores-table">
    <thead>
      <tr><th>Player</th><th>Score</th></tr>
    </thead>
    <tbody id="scores-table-body"></tbody>
  </table>
  <button class="big-btn secondary" id="hs-back-btn">← Back</button>
</div>

<script src="js/dinos.js"></script>
<script src="js/scores.js"></script>
<script src="js/game.js"></script>
</body>
</html>
